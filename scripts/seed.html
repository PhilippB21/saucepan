    const recipes = Object.fromEntries(SAMPLE_RECIPES.map(r => {
      const { link, links, ...rest } = r;
      const resolvedLinks = links ?? (link ? [{ url: link, label: "" }] : []);
      return [nameToId(r.name), { ...rest, links: resolvedLinks }];
    }));

    const SEED_DATA = {
      recipes,
      plans: {},
    };

    // ── UI-Logik ───────────────────────────────────────────────────────────────
    let currentUser = null;
    let targetPlanId = null;

    async function loadUserPlan(user) {
      const token = await user.getIdToken();
      const res = await fetch(`${FIREBASE_URL.replace("/essensplan", "")}/users/${user.uid}/planId.json?auth=${token}`);
      if (!res.ok) return null;
      return await res.json();
    }

    document.getElementById("btnLogin").addEventListener("click", async () => {
      try {
        const result = await signInWithPopup(auth, new GoogleAuthProvider());
        currentUser = result.user;
        log(`✅ Eingeloggt als: ${currentUser.email}`);
        document.getElementById("btnLogin").disabled = true;

        // Plan-ID des Nutzers laden
        log("🔍 Suche zugehörigen Essensplan...");
        const existingPlanId = await loadUserPlan(currentUser);

        if (existingPlanId) {
          targetPlanId = existingPlanId;
          log(`📋 Plan gefunden: ${existingPlanId}`);
          document.getElementById("planIdInput").value = existingPlanId;
        } else {
          log("ℹ️  Kein Plan gefunden. Bitte Plan-ID eingeben oder leer lassen für einen neuen Plan.");
        }

        document.getElementById("planSection").style.display = "block";
        document.getElementById("btnSeed").disabled = false;
      } catch (e) {
        log(`❌ Login fehlgeschlagen: ${e.message}`);
      }
    });

      if (!currentUser) return;

      const inputPlanId = document.getElementById("planIdInput").value.trim().toUpperCase();
      const planId = inputPlanId || Math.random().toString(36).slice(2, 8).toUpperCase();

      document.getElementById("btnSeed").disabled = true;
      log(`⏳ Schreibe Rezepte in Plan "${planId}"...`);

      try {
        const token = await currentUser.getIdToken();
        const base = FIREBASE_URL.replace("/essensplan", "");
        const planUrl = `${base}/essensplan/${planId}`;

        // Plan anlegen (PATCH, um bestehende plans/members nicht zu überschreiben)
        const isNew = !inputPlanId;
        if (isNew) {
          // Neuer Plan: komplett anlegen mit members
          const res = await fetch(`${planUrl}.json?auth=${token}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: "Essensplan",
              members: { [currentUser.uid]: true },
              recipes,
              plans: {},
            }),
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          // Nutzerprofil aktualisieren
          await fetch(`${base}/users/${currentUser.uid}.json?auth=${token}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ planId, email: currentUser.email, displayName: currentUser.displayName }),
          });
          log(`✅ Neuer Plan "${planId}" erstellt und ${Object.keys(recipes).length} Rezepte geschrieben.`);
        } else {
          // Bestehender Plan: nur Rezepte aktualisieren
          const res = await fetch(`${planUrl}/recipes.json?auth=${token}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(recipes),
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          log(`✅ ${Object.keys(recipes).length} Rezepte in Plan "${planId}" geschrieben.`);
        }

        log("\nDu kannst dieses Fenster jetzt schließen.");
      } catch (e) {
        log(`❌ Fehler: ${e.message}`);
        document.getElementById("btnSeed").disabled = false;
      }
    });
  </script>
</body>
</html>
